<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sol Sniper Dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns@3"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0d1117; color: #e6edf3; padding: 20px; }
  .header { display: flex; align-items: center; gap: 12px; margin-bottom: 24px; }
  .header h1 { font-size: 24px; }
  .loading { text-align: center; padding: 60px; color: #8b949e; }
  .loading .spinner { display: inline-block; width: 24px; height: 24px; border: 3px solid #30363d; border-top-color: #58a6ff; border-radius: 50%; animation: spin 0.8s linear infinite; margin-bottom: 12px; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 12px; margin-bottom: 24px; }
  .stat-card { background: #161b22; border: 1px solid #30363d; border-radius: 8px; padding: 16px; }
  .stat-card .label { font-size: 12px; color: #8b949e; text-transform: uppercase; margin-bottom: 4px; }
  .stat-card .value { font-size: 24px; font-weight: 600; }
  .stat-card .value.positive { color: #3fb950; }
  .stat-card .value.negative { color: #f85149; }
  .chart-container { background: #161b22; border: 1px solid #30363d; border-radius: 8px; padding: 16px; margin-bottom: 24px; }
  .chart-container h2 { font-size: 16px; margin-bottom: 12px; color: #8b949e; }
  .chart-container canvas { min-height: 350px; }
  .trades-section { background: #161b22; border: 1px solid #30363d; border-radius: 8px; padding: 16px; }
  .trades-section h2 { font-size: 16px; margin-bottom: 12px; color: #8b949e; }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  th { text-align: left; padding: 8px 12px; border-bottom: 1px solid #30363d; color: #8b949e; font-weight: 500; }
  td { padding: 8px 12px; border-bottom: 1px solid #21262d; }
  tr:hover { background: #1c2128; }
  .pnl-positive { color: #3fb950; font-weight: 600; }
  .pnl-negative { color: #f85149; font-weight: 600; }
  .badge { display: inline-block; padding: 2px 8px; border-radius: 12px; font-size: 11px; font-weight: 500; }
  .badge-win { background: #23883433; color: #3fb950; }
  .badge-loss { background: #f8514933; color: #f85149; }
  .badge-open { background: #1f6feb33; color: #58a6ff; }
  .time { color: #8b949e; font-size: 12px; }
  .wallet-info { color: #8b949e; font-size: 12px; margin-bottom: 8px; }
  .wallet-info a { color: #58a6ff; text-decoration: none; }
  .refresh-note { text-align: center; color: #484f58; font-size: 12px; margin-top: 16px; }
  .error { text-align: center; padding: 40px; color: #f85149; }
</style>
</head>
<body>
<div class="header">
  <span style="font-size:28px">&#x1F3AF;</span>
  <h1>Sol Sniper</h1>
</div>

<div id="app">
  <div class="loading">
    <div class="spinner"></div>
    <p>Loading on-chain data...</p>
  </div>
</div>

<script>
const WALLET = 'gR3HoEeJCbbvfNRVAFUSmp6fqg5BwMZ6dNgo6K9QWXJ';
const HELIUS_API_KEY = '03cf5b3d-2534-4364-b3d9-523d6f0a4463';
const HELIUS_RPC = 'https://mainnet.helius-rpc.com/?api-key=' + HELIUS_API_KEY;
const HELIUS_API = 'https://api.helius.xyz/v0';
const SOL_MINT = 'So11111111111111111111111111111111111111112';
const STABLES = new Set([
  'EPjFWdd5AufqSSqeM2qN1xzybapC8G4wEGGkZwyTDt1v',
  'Es9vMFrzaCERmJfrF4H2FYD4KCoNkY11McCe8BenwNYB',
]);
const STARTING_SOL = 1.0;

async function getWalletSignatures(wallet, limit) {
  limit = limit || 200;
  var allSigs = [];
  var before = undefined;
  while (allSigs.length < limit) {
    var params = [wallet, { limit: 100 }];
    if (before) params[1].before = before;
    var resp = await fetch(HELIUS_RPC, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ jsonrpc: '2.0', id: 1, method: 'getSignaturesForAddress', params: params }),
    });
    var data = await resp.json();
    var sigs = data.result || [];
    if (!sigs.length) break;
    allSigs.push.apply(allSigs, sigs.filter(function(s) { return !s.err; }));
    before = sigs[sigs.length - 1].signature;
    if (sigs.length < 100) break;
  }
  return allSigs;
}

async function getEnhancedTransactions(signatures) {
  var all = [];
  for (var i = 0; i < signatures.length; i += 100) {
    var batch = signatures.slice(i, i + 100);
    var resp = await fetch(HELIUS_API + '/transactions?api-key=' + HELIUS_API_KEY, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ transactions: batch }),
    });
    if (resp.ok) {
      var txns = await resp.json();
      all.push.apply(all, txns);
    }
  }
  return all;
}

async function getSOLBalance(wallet) {
  var resp = await fetch(HELIUS_RPC, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ jsonrpc: '2.0', id: 1, method: 'getBalance', params: [wallet] }),
  });
  var data = await resp.json();
  return ((data.result || {}).value || 0) / 1e9;
}

function parseSwaps(txns, wallet) {
  var swaps = [];
  for (var ti = 0; ti < txns.length; ti++) {
    var tx = txns[ti];
    if (tx.type !== 'SWAP') continue;
    var transfers = tx.tokenTransfers || [];
    var nativeTransfers = tx.nativeTransfers || [];
    var ts = tx.timestamp ? new Date(tx.timestamp * 1000).toISOString() : null;
    var solSent = 0, solReceived = 0;
    var tokenMint = null, tokenSent = 0, tokenReceived = 0;
    for (var ni = 0; ni < nativeTransfers.length; ni++) {
      var nt = nativeTransfers[ni];
      var amt = (nt.amount || 0) / 1e9;
      if (nt.fromUserAccount === wallet) solSent += amt;
      if (nt.toUserAccount === wallet) solReceived += amt;
    }
    for (var ki = 0; ki < transfers.length; ki++) {
      var t = transfers[ki];
      var mint = t.mint || '';
      var tamt = t.tokenAmount || 0;
      if (mint === SOL_MINT) {
        if (t.fromUserAccount === wallet) solSent += tamt;
        if (t.toUserAccount === wallet) solReceived += tamt;
      } else if (STABLES.has(mint)) {
        if (t.fromUserAccount === wallet) solSent += tamt / 150;
        if (t.toUserAccount === wallet) solReceived += tamt / 150;
      } else {
        if (t.toUserAccount === wallet) { tokenMint = mint; tokenReceived += tamt; }
        if (t.fromUserAccount === wallet) { tokenMint = mint; tokenSent += tamt; }
      }
    }
    if (!tokenMint) continue;
    var isBuy = tokenReceived > 0 && solSent > 0.001;
    var isSell = tokenSent > 0 && (solReceived > 0 || solSent < 0.01);
    if (isBuy) {
      swaps.push({ ts: ts, type: 'BUY', mint: tokenMint, solAmount: Math.max(solSent - solReceived, 0), tokenAmount: tokenReceived, sig: tx.signature });
    } else if (isSell) {
      swaps.push({ ts: ts, type: 'SELL', mint: tokenMint, solAmount: Math.max(solReceived - solSent, 0), tokenAmount: tokenSent, sig: tx.signature });
    }
  }
  swaps.sort(function(a, b) { return new Date(a.ts) - new Date(b.ts); });
  return swaps;
}

function buildTrades(swaps) {
  var open = {};
  var closed = [];
  for (var i = 0; i < swaps.length; i++) {
    var s = swaps[i];
    if (s.type === 'BUY') {
      if (!open[s.mint]) open[s.mint] = { totalSol: 0, totalTokens: 0, firstTs: s.ts };
      open[s.mint].totalSol += s.solAmount;
      open[s.mint].totalTokens += s.tokenAmount;
    } else if (s.type === 'SELL') {
      var pos = open[s.mint];
      if (!pos) continue;
      var pnlSol = s.solAmount - pos.totalSol;
      var pnlPct = pos.totalSol > 0 ? (pnlSol / pos.totalSol) * 100 : 0;
      closed.push({
        mint: s.mint, entryTime: pos.firstTs, exitTime: s.ts,
        solSpent: pos.totalSol, solReceived: s.solAmount,
        pnlSol: pnlSol, pnlPct: pnlPct
      });
      delete open[s.mint];
    }
  }
  var keys = Object.keys(open);
  for (var j = 0; j < keys.length; j++) {
    var m = keys[j], p = open[m];
    closed.push({ mint: m, entryTime: p.firstTs, exitTime: null, solSpent: p.totalSol, solReceived: null, pnlSol: null, pnlPct: null, isOpen: true });
  }
  closed.sort(function(a, b) { return new Date(b.entryTime) - new Date(a.entryTime); });
  return closed;
}

function buildWalletHistory(swaps, startingSol) {
  var history = [];
  var balance = startingSol;
  if (swaps.length > 0) history.push({ ts: swaps[0].ts, sol: startingSol, event: 'Start' });
  for (var i = 0; i < swaps.length; i++) {
    var s = swaps[i];
    if (s.type === 'BUY') balance -= s.solAmount;
    else balance += s.solAmount;
    history.push({ ts: s.ts, sol: Math.round(balance * 10000) / 10000, event: s.type + ' ' + s.mint.slice(0, 8) + '...' });
  }
  return history;
}

async function getTokenMetadata(mints) {
  var meta = {};
  var unique = [];
  var seen = {};
  for (var i = 0; i < mints.length; i++) {
    if (!seen[mints[i]]) { unique.push(mints[i]); seen[mints[i]] = true; }
  }
  // Use Helius DAS getAssetBatch for pump.fun Token-2022 tokens
  try {
    var resp = await fetch(HELIUS_RPC, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ jsonrpc: '2.0', id: 1, method: 'getAssetBatch', params: { ids: unique } }),
    });
    if (resp.ok) {
      var data = await resp.json();
      var results = data.result || [];
      for (var j = 0; j < results.length; j++) {
        var asset = results[j];
        if (!asset || !asset.id) continue;
        var cm = ((asset.content || {}).metadata || {});
        meta[asset.id] = { symbol: cm.symbol || asset.id.slice(0, 8), name: cm.name || '' };
      }
    }
  } catch (e) { console.warn('Token metadata fetch failed:', e); }
  return meta;
}

function fmtTime(iso) {
  if (!iso) return '-';
  return new Date(iso).toLocaleString('en-US', { month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit', hour12: false });
}

function pnlClass(val) { return val == null ? '' : val >= 0 ? 'pnl-positive' : 'pnl-negative'; }
function pnlSign(val, dec, suf) { if (val == null) return '-'; dec = dec || 4; suf = suf || ''; return (val >= 0 ? '+' : '') + val.toFixed(dec) + suf; }

var chart = null;

function render(trades, history, summary, tokenMeta, currentBalance) {
  var app = document.getElementById('app');
  app.innerHTML = '<div class="wallet-info">Wallet: <a href="https://solscan.io/account/' + WALLET + '" target="_blank">' + WALLET.slice(0, 8) + '...' + WALLET.slice(-6) + '</a> &nbsp;|&nbsp; Current balance: <strong>' + currentBalance.toFixed(4) + ' SOL</strong></div>' +
    '<div class="stats">' +
    '<div class="stat-card"><div class="label">Total Trades</div><div class="value">' + summary.total + '</div></div>' +
    '<div class="stat-card"><div class="label">Win Rate</div><div class="value">' + summary.winRate + '%</div></div>' +
    '<div class="stat-card"><div class="label">Wins / Losses</div><div class="value">' + summary.wins + ' / ' + summary.losses + '</div></div>' +
    '<div class="stat-card"><div class="label">Total PnL</div><div class="value ' + (summary.totalPnl >= 0 ? 'positive' : 'negative') + '">' + pnlSign(summary.totalPnl) + ' SOL</div></div>' +
    '<div class="stat-card"><div class="label">Best Trade</div><div class="value positive">' + pnlSign(summary.bestPct, 1, '%') + '</div></div>' +
    '<div class="stat-card"><div class="label">Worst Trade</div><div class="value negative">' + pnlSign(summary.worstPct, 1, '%') + '</div></div>' +
    '</div>' +
    '<div class="chart-container"><h2>Wallet Value (SOL)</h2><canvas id="walletChart"></canvas></div>' +
    '<div class="trades-section"><h2>Trade History</h2><table><thead><tr><th>Token</th><th>Entry Time</th><th>Exit Time</th><th>SOL In</th><th>SOL Out</th><th>PnL %</th><th>PnL (SOL)</th><th>Status</th></tr></thead><tbody id="tradesBody"></tbody></table></div>' +
    '<p class="refresh-note">Data sourced directly from on-chain transactions via Helius API</p>';

  // Chart
  var labels = history.map(function(h) { return new Date(h.ts); });
  var data = history.map(function(h) { return h.sol; });
  labels.push(new Date());
  data.push(currentBalance);

  var ctx = document.getElementById('walletChart').getContext('2d');
  var endVal = data[data.length - 1] || 1;
  var startVal = data[0] || 1;
  var lineColor = endVal >= startVal ? '#3fb950' : '#f85149';

  chart = new Chart(ctx, {
    type: 'line',
    data: { labels: labels, datasets: [{ data: data, borderColor: lineColor, backgroundColor: lineColor + '1a', fill: true, tension: 0.1, pointRadius: 4, pointBackgroundColor: lineColor, pointHoverRadius: 6 }] },
    options: {
      responsive: true,
      plugins: { legend: { display: false }, tooltip: { callbacks: {
        title: function(items) { return fmtTime((history[items[0].dataIndex] || {}).ts || new Date().toISOString()); },
        afterLabel: function(item) { return (history[item.dataIndex] || {}).event || 'Current'; }
      }}},
      scales: {
        x: { type: 'time', time: { unit: 'hour' }, grid: { color: '#21262d' }, ticks: { color: '#8b949e' } },
        y: { min: Math.min.apply(null, data) * 0.95, max: Math.max.apply(null, data) * 1.05, grid: { color: '#21262d' }, ticks: { color: '#8b949e', callback: function(v) { return v.toFixed(4) + ' SOL'; } } }
      }
    }
  });

  // Trades table
  var tbody = document.getElementById('tradesBody');
  var rows = '';
  for (var i = 0; i < trades.length; i++) {
    var tr = trades[i];
    var meta = tokenMeta[tr.mint] || {};
    var sym = (meta.symbol || tr.mint.slice(0, 8)).replace(/\0/g, '').trim();
    var isOpen = tr.isOpen;
    var badge = isOpen ? '<span class="badge badge-open">OPEN</span>' : tr.pnlSol >= 0 ? '<span class="badge badge-win">WIN</span>' : '<span class="badge badge-loss">LOSS</span>';
    rows += '<tr><td><a href="https://pump.fun/coin/' + tr.mint + '" target="_blank" style="color:#e6edf3;text-decoration:none"><strong>' + sym + '</strong></a> <span class="time">' + tr.mint.slice(0, 12) + '...</span></td>' +
      '<td class="time">' + fmtTime(tr.entryTime) + '</td>' +
      '<td class="time">' + fmtTime(tr.exitTime) + '</td>' +
      '<td>' + tr.solSpent.toFixed(4) + '</td>' +
      '<td>' + (tr.solReceived != null ? tr.solReceived.toFixed(4) : '-') + '</td>' +
      '<td class="' + pnlClass(tr.pnlPct) + '">' + pnlSign(tr.pnlPct, 1, '%') + '</td>' +
      '<td class="' + pnlClass(tr.pnlSol) + '">' + pnlSign(tr.pnlSol) + '</td>' +
      '<td>' + badge + '</td></tr>';
  }
  tbody.innerHTML = rows;
}

async function main() {
  try {
    var results = await Promise.all([getWalletSignatures(WALLET), getSOLBalance(WALLET)]);
    var sigData = results[0];
    var currentBalance = results[1];
    var sigs = sigData.map(function(s) { return s.signature; });
    var txns = await getEnhancedTransactions(sigs);
    var swaps = parseSwaps(txns, WALLET);
    var mints = swaps.map(function(s) { return s.mint; });
    var tokenMeta = await getTokenMetadata(mints);
    var trades = buildTrades(swaps);
    var history = buildWalletHistory(swaps, STARTING_SOL);
    var closed = trades.filter(function(t) { return !t.isOpen; });
    var wins = closed.filter(function(t) { return t.pnlSol >= 0; }).length;
    var losses = closed.length - wins;
    var totalPnl = closed.reduce(function(s, t) { return s + (t.pnlSol || 0); }, 0);
    var pcts = closed.map(function(t) { return t.pnlPct || 0; });
    var summary = {
      total: closed.length, wins: wins, losses: losses,
      winRate: closed.length > 0 ? Math.round(wins / closed.length * 1000) / 10 : 0,
      totalPnl: Math.round(totalPnl * 10000) / 10000,
      bestPct: pcts.length ? Math.max.apply(null, pcts) : 0,
      worstPct: pcts.length ? Math.min.apply(null, pcts) : 0,
    };
    render(trades, history, summary, tokenMeta, currentBalance);
  } catch (err) {
    document.getElementById('app').innerHTML = '<div class="error"><p>Failed to load on-chain data</p><p style="font-size:13px;margin-top:8px">' + err.message + '</p></div>';
    console.error(err);
  }
}

main();
</script>
</body>
</html>
